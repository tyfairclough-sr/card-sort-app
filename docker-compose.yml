services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Host 5433 avoids clashing with another Postgres on 5432.
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: card_sort
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
